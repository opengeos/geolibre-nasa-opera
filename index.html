<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeoLibre NASA OPERA plugin - standalone demo</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        position: absolute;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }
      .demo-hint {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10;
        background: rgba(0, 0, 0, 0.65);
        color: #fff;
        font:
          12px/1.4 -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        padding: 6px 12px;
        border-radius: 6px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div class="demo-hint">
      Standalone NASA OPERA plugin demo - open the panel (top-left), set a bbox,
      and Search.
    </div>
    <script type="module" src="./examples/main.ts"></script>
  </body>
</html>
